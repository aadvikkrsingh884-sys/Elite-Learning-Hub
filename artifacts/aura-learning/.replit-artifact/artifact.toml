kind = "web"
previewPath = "/"
title = "AuraLearning Elite"
version = "1.0.0"
id = "artifacts/aura-learning"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18950

[services.development]
run = "pnpm --filter @workspace/aura-learning run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/aura-learning", "run", "build" ]
serve = "static"
publicDir = "artifacts/aura-learning/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18950"
BASE_PATH = "/"
